<!DOCTYPE html>
<html>
    <head>
        <title>Listas</title>
    </head>
    <body>
        <!--Listas no ordenadas-->
        <h1>Pagina web con Listas</h1>
        <h2>Lista desorndenada</h2>
        <ul>
            <li>Elemento de lista 1</li> <!--Los "li" son elementos de listas-->
            <li>Elemento de lista 2</li>
            <li>Elemento de lista 3</li>
        </ul>
        <h2>Lista ordenada</h2>
        <!--Listas ordenadas-->
        <ol>
            <li>Elemento de lista 1</li>
            <li>Elemento de lista 2</li>
            <li>Elemento de lista 3</li>
        </ol>
        <button><a href="../index.html">Página de Inicio</a></button>
    </body>
</html>
