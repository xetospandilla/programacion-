<!DOCTYPE html>
<html>
    <head>
        <title>Imagenes</title>
    </head>
    <body>
        <h1>Pagina con una imagen</h1>
        <img
        src="../images/yo.png"
        alt="Imagen de Carlos Galán Cubells con los brazos cruzados mirando al frente"
        title="Imagen de Carlos Galán Cubells"
        width="200"
        ><br> <!--la etiqueta "br" sirve para hacer saltos de línea || También se puede aplicar dentro de párrafos y otras etiquetas-->
        <!--
        //  Atributos
        src="" -> sirve para indicar el archivo a mostrar
        alt="" -> en caso de no cargar la imagen muestra un texto alternativo que indica lo que muestra la imagen
        title="" -> se puede usar para todas las etiquetas como titulos, etc. Sirve como identificador para la base de datos
        
        Existen otras propiedades como el ancho y el alto, pero es más recomendable modificarlo aplicando CSS
        -->
        <p><button><a href="../index.html">Página de Inicio</a></button></p>
    </body>
</html>
